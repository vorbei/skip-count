<html lang="zh-CN">
<head>

<style>
  /* iOS dark-system palette (Apple Fitness look) */
  :root{
    --ink:#000;                       /* systemBackground */
    --panel:#1c1c1e;                  /* secondarySystemBackground */
    --fill:#2c2c2e;                   /* tertiary fill */
    --line:rgba(84,84,88,.5);         /* separator */
    --paper:#fff;
    --dim:#8e8e93;                    /* secondaryLabel */
    --hot:#fa114f;                    /* Fitness move-ring pink */
    --go:#30d158;                     /* systemGreen (dark) */
    --lime:#affc03;                   /* Fitness exercise-ring lime */
    --cyan:#64d2ff;                   /* systemTeal (dark) */
    --num:ui-rounded,-apple-system,"SF Pro Rounded","PingFang SC",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--ink);
    color:var(--paper);
    font-family:-apple-system,"SF Pro Text","PingFang SC","Helvetica Neue",Arial,sans-serif;
    display:flex;flex-direction:column;min-height:100dvh;
    overflow:hidden;
  }
  header{
    display:flex;align-items:center;gap:10px;
    padding:max(14px,env(safe-area-inset-top)) 20px 8px;
    flex:none;
  }
  header h1{font-size:22px;font-weight:700;letter-spacing:-.02em}
  header h1 em{color:var(--go);font-style:normal}
  header .tag{font-size:12px;color:var(--dim);align-self:flex-end;padding-bottom:3px}
  header .cam-dot{
    margin-left:auto;width:10px;height:10px;border-radius:50%;
    background:var(--fill);flex:none;transition:background .3s;
  }
  header .cam-dot.live{background:var(--hot);box-shadow:0 0 10px var(--hot);animation:blink 1.2s infinite}
  @keyframes blink{50%{opacity:.45}}

  /* ---- stage ---- */
  .stage{
    position:relative;flex:1;min-height:0;
    background:#000;overflow:hidden;
    border-radius:20px;margin:0 10px;
  }
  video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:saturate(.9)}
  video.mirror{transform:scaleX(-1)}
  .pose-canvas{position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none}
  .perf{position:absolute;top:10px;left:12px;z-index:4;font-size:11px;font-variant-numeric:tabular-nums;
    color:var(--cyan);background:rgba(0,0,0,.55);padding:3px 8px;border-radius:8px;
    font-family:ui-monospace,Menlo,monospace;pointer-events:none}
  /* camera flip button (overlay) */
  .flip-btn{
    position:absolute;top:12px;right:12px;z-index:4;display:none;flex:none;
    width:40px;height:40px;padding:0;border-radius:50%;
    background:rgba(28,28,30,.75);color:var(--paper);
    align-items:center;justify-content:center;
  }
  .flip-btn svg{display:block;width:20px;height:20px}
  .count-wrap{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;pointer-events:none;z-index:2;
  }
  .count{
    font-family:var(--num);font-variant-numeric:tabular-nums;
    font-weight:800;font-size:clamp(96px,32vw,220px);line-height:.9;
    letter-spacing:-.03em;color:#fff;
    text-shadow:0 4px 30px rgba(0,0,0,.6);
    transition:transform .08s ease;
  }
  .count.pop{transform:scale(1.06);color:var(--lime);text-shadow:0 0 40px rgba(175,252,3,.4)}
  .count-label{
    font-size:12px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;
    color:rgba(255,255,255,.7);margin-top:6px;text-shadow:0 1px 6px rgba(0,0,0,.7);
  }
  .hint{
    position:absolute;left:16px;right:16px;bottom:84px;text-align:center;z-index:3;
    font-size:14px;font-weight:500;color:#fff;text-shadow:0 1px 8px rgba(0,0,0,.9);
  }
  /* signal strip */
  .wave-wrap{
    position:absolute;left:0;right:0;bottom:0;height:64px;z-index:3;
    background:linear-gradient(180deg,transparent,rgba(0,0,0,.8));
  }
  #wave{width:100%;height:100%;display:block}

  /* ---- stats (Fitness metric colors) ---- */
  .stats{
    flex:none;display:grid;grid-template-columns:1fr 1.2fr 1fr;
    padding:10px 10px 2px;gap:0;align-items:end;
  }
  .stat{padding:6px 8px;text-align:center}
  .stat b{display:block;font-family:var(--num);font-size:26px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1.1}
  #bpm{color:var(--lime)}
  #cal{color:var(--hot)}
  #time{font-size:46px;font-weight:800;color:#fff;letter-spacing:-.02em}   /* enlarged timer */
  .stat span{font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;color:var(--dim)}
  /* 3·2·1 countdown overlay */
  .countdown{
    position:absolute;inset:0;z-index:5;pointer-events:none;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--num);font-weight:800;font-variant-numeric:tabular-nums;
    font-size:clamp(150px,44vw,340px);color:var(--lime);
    text-shadow:0 6px 44px rgba(0,0,0,.75);
  }

  /* ---- controls ---- */
  .controls{
    flex:none;padding:10px 16px calc(14px + env(safe-area-inset-bottom));
    display:flex;flex-direction:column;gap:12px;
  }
  .row{display:flex;gap:12px;align-items:center;justify-content:center}
  button{
    appearance:none;border:none;cursor:pointer;
    font:inherit;font-weight:600;
    border-radius:14px;padding:15px 0;flex:1;
    transition:transform .12s ease, opacity .15s;
  }
  button:active{transform:scale(.96);opacity:.85}
  button:focus-visible{outline:2px solid var(--go);outline-offset:2px}
  #btnMain{background:var(--go);color:#fff;font-size:17px;border-radius:26px;max-width:420px}
  #btnMain.running{background:var(--fill);color:var(--paper)}
  .icon-btn{
    flex:0 0 auto;width:52px;height:52px;padding:0;border-radius:50%;
    background:var(--panel);color:var(--paper);
    display:flex;align-items:center;justify-content:center;
  }
  .icon-btn svg{width:22px;height:22px}
  .icon-btn.on{color:var(--go)}
  /* collapsible settings panel — iOS inset grouped list */
  .settings{display:flex;flex-direction:column;background:var(--panel);border-radius:14px;overflow:hidden}
  .settings[hidden]{display:none}
  .set-row{
    display:flex;align-items:center;gap:12px;min-height:48px;padding:6px 16px;
  }
  .set-row + .set-row{border-top:.5px solid var(--line)}
  .set-row > label, .set-row > .set-label{font-size:15px;color:var(--paper);flex:none;min-width:64px}
  input[type=range]{flex:1;accent-color:var(--go);height:24px}
  /* iOS segmented control */
  .seg{display:flex;flex:1;padding:2px;border-radius:9px;background:rgba(118,118,128,.24)}
  .seg-btn{flex:1;padding:6px 0;border-radius:7px;background:transparent;color:#fff;font-size:13px;font-weight:600}
  .seg-btn.active{background:#636366;box-shadow:0 3px 8px rgba(0,0,0,.22)}
  /* iOS switch */
  .switch{
    flex:0 0 auto;width:51px;height:31px;border-radius:16px;padding:0;margin-left:auto;
    background:rgba(120,120,128,.32);position:relative;transition:background .2s;
  }
  .switch::after{
    content:"";position:absolute;top:2px;left:2px;width:27px;height:27px;border-radius:50%;
    background:#fff;box-shadow:0 3px 8px rgba(0,0,0,.35);transition:left .2s;
  }
  .switch.on{background:var(--go)}
  .switch.on::after{left:22px}
  .switch:active{transform:none}
  .export-btn{
    flex:1;display:flex;align-items:center;justify-content:center;gap:7px;
    padding:11px 8px;background:var(--fill);color:var(--paper);font-size:13px;border-radius:10px;
  }
  .export-btn svg{width:16px;height:16px;flex:none}
  .count.done{color:var(--lime);text-shadow:0 0 44px rgba(175,252,3,.45)}
  @media (prefers-reduced-motion:reduce){
    .count{transition:none}.cam-dot.live{animation:none}
  }
</style>
</head>
<body>

<header>
  <h1>跳绳</h1>
  <span class="tag">AI 姿态计数</span>
  <span class="cam-dot" id="camDot"></span>
</header>

<div class="stage">
  <video id="video" playsinline muted></video>
  <canvas id="pose" class="pose-canvas"></canvas>
  <div class="perf" id="perf" hidden></div>
  <button class="flip-btn" id="btnFlip" title="切换摄像头" aria-label="切换摄像头">
    <svg viewBox="0 0 512 512" fill="none" stroke="currentColor" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="m350.54 148.68l-26.62-42.06C318.31 100.08 310.62 96 302 96h-92c-8.62 0-16.31 4.08-21.92 10.62l-26.62 42.06C155.85 155.23 148.62 160 140 160H80a32 32 0 0 0-32 32v192a32 32 0 0 0 32 32h352a32 32 0 0 0 32-32V192a32 32 0 0 0-32-32h-59c-8.65 0-16.85-4.77-22.46-11.32"/>
      <path d="M124 158v-22h-24v22m235.76 127.22v-13.31a80 80 0 0 0-131-61.6M176 258.78v13.31a80 80 0 0 0 130.73 61.8"/>
      <path d="m196 272l-20-20l-20 20m200 0l-20 20l-20-20"/>
    </svg>
  </button>
  <div class="count-wrap">
    <div class="count" id="count">0</div>
    <div class="count-label">JUMPS · 次数</div>
  </div>
  <div class="countdown" id="countdown" style="display:none"></div>
  <div class="hint" id="hint">点击「开始」并允许摄像头。侧对或正对镜头，全身入画，开始跳绳即可自动计数。</div>
  <div class="wave-wrap"><canvas id="wave"></canvas></div>
</div>

<div class="stats">
  <div class="stat"><b id="bpm">--</b><span>次 / 分钟</span></div>
  <div class="stat time-stat"><b id="time">0:00</b><span id="timeLabel">用时</span></div>
  <div class="stat"><b id="cal">0</b><span>大约千卡</span></div>
</div>

<div class="controls">
  <div class="row">
    <button id="btnReset" class="icon-btn" title="清零" aria-label="清零">
      <svg viewBox="0 0 512 512" fill="none" stroke="currentColor" stroke-width="32" aria-hidden="true"><path stroke-linecap="round" stroke-miterlimit="10" d="M320 146s24.36-12-64-12a160 160 0 1 0 160 160"/><path stroke-linecap="round" stroke-linejoin="round" d="m256 58l80 80l-80 80"/></svg>
    </button>
    <button id="btnMain">开始</button>
    <button id="btnSettings" class="icon-btn" title="设置" aria-label="设置">
      <svg viewBox="0 0 512 512" fill="none" stroke="currentColor" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M262.29 192.31a64 64 0 1 0 57.4 57.4a64.13 64.13 0 0 0-57.4-57.4M416.39 256a154 154 0 0 1-1.53 20.79l45.21 35.46a10.81 10.81 0 0 1 2.45 13.75l-42.77 74a10.81 10.81 0 0 1-13.14 4.59l-44.9-18.08a16.11 16.11 0 0 0-15.17 1.75A164.5 164.5 0 0 1 325 400.8a15.94 15.94 0 0 0-8.82 12.14l-6.73 47.89a11.08 11.08 0 0 1-10.68 9.17h-85.54a11.11 11.11 0 0 1-10.69-8.87l-6.72-47.82a16.07 16.07 0 0 0-9-12.22a155 155 0 0 1-21.46-12.57a16 16 0 0 0-15.11-1.71l-44.89 18.07a10.81 10.81 0 0 1-13.14-4.58l-42.77-74a10.8 10.8 0 0 1 2.45-13.75l38.21-30a16.05 16.05 0 0 0 6-14.08c-.36-4.17-.58-8.33-.58-12.5s.21-8.27.58-12.35a16 16 0 0 0-6.07-13.94l-38.19-30A10.81 10.81 0 0 1 49.48 186l42.77-74a10.81 10.81 0 0 1 13.14-4.59l44.9 18.08a16.11 16.11 0 0 0 15.17-1.75A164.5 164.5 0 0 1 187 111.2a15.94 15.94 0 0 0 8.82-12.14l6.73-47.89A11.08 11.08 0 0 1 213.23 42h85.54a11.11 11.11 0 0 1 10.69 8.87l6.72 47.82a16.07 16.07 0 0 0 9 12.22a155 155 0 0 1 21.46 12.57a16 16 0 0 0 15.11 1.71l44.89-18.07a10.81 10.81 0 0 1 13.14 4.58l42.77 74a10.8 10.8 0 0 1-2.45 13.75l-38.21 30a16.05 16.05 0 0 0-6.05 14.08c.33 4.14.55 8.3.55 12.47"/></svg>
    </button>
  </div>
  <div class="settings" id="settings" hidden>
    <div class="set-row">
      <label for="sens">灵敏度</label>
      <input type="range" id="sens" min="1" max="10" value="5" step="1">
    </div>
    <div class="set-row">
      <span class="set-label">模式</span>
      <div class="seg" id="modeSeg">
        <button class="seg-btn active" data-mode="free">自由</button>
        <button class="seg-btn" data-mode="timed">计时 1 分钟</button>
      </div>
    </div>
    <div class="set-row">
      <span class="set-label">算法</span>
      <div class="seg" id="algoSeg">
        <button class="seg-btn" data-algo="A">身体·抗绊绳</button>
        <button class="seg-btn active" data-algo="B">脚踝·双弹跳</button>
      </div>
    </div>
    <div class="set-row">
      <span class="set-label">计数提示音</span>
      <button id="btnSound" class="switch on" role="switch" aria-checked="true" aria-label="计数提示音"></button>
    </div>
    <div class="set-row">
      <button id="btnExport" class="export-btn">
        <svg viewBox="0 0 512 512" fill="none" stroke="currentColor" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M336 192h40a40 40 0 0 1 40 40v192a40 40 0 0 1-40 40H136a40 40 0 0 1-40-40V232a40 40 0 0 1 40-40h40m160-64l-80-80l-80 80m80 193V48"/></svg>
        导出数据
      </button>
      <button id="btnChart" class="export-btn">
        <svg viewBox="0 0 512 512" fill="none" stroke="currentColor" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="48" height="160" x="64" y="320" rx="8" ry="8"/><rect width="48" height="256" x="288" y="224" rx="8" ry="8"/><rect width="48" height="368" x="400" y="112" rx="8" ry="8"/><rect width="48" height="448" x="176" y="32" rx="8" ry="8"/></svg>
        配速图
      </button>
    </div>
  </div>
</div>

<script>
(() => {
  const video = document.getElementById('video');
  const countEl = document.getElementById('count');
  const countdownEl = document.getElementById('countdown');
  const bpmEl = document.getElementById('bpm');
  const timeEl = document.getElementById('time');
  const calEl = document.getElementById('cal');
  const hintEl = document.getElementById('hint');
  const camDot = document.getElementById('camDot');
  const btnMain = document.getElementById('btnMain');
  const btnReset = document.getElementById('btnReset');
  const btnSound = document.getElementById('btnSound');
  const sensEl = document.getElementById('sens');
  const btnFlip = document.getElementById('btnFlip');
  const perfEl = document.getElementById('perf');
  const timeLabel = document.getElementById('timeLabel');
  const modeSeg = document.getElementById('modeSeg');
  const algoSeg = document.getElementById('algoSeg');
  const btnSettings = document.getElementById('btnSettings');
  const settingsEl = document.getElementById('settings');
  const btnExport = document.getElementById('btnExport');
  const btnChart = document.getElementById('btnChart');
  const wave = document.getElementById('wave');
  const wctx = wave.getContext('2d');

  // ---------- state ----------
  let running = false, stream = null, rafId = 0;
  let count = 0, startTs = 0, elapsed = 0;
  let soundOn = true;
  let jumpTimes = [];          // timestamps of counted jumps (for bpm)
  let jumpLog = [];            // per-jump export records {n,t,amp,iv}
  let breakLog = [];           // interruption/trip records (algo A) {t,retro,pauseMs}
  const history = [];          // signal history for waveform
  const MAXH = 260;
  let mode = 'free';           // 'free' | 'timed'
  const TIMED_MS = 60000;      // 1-minute timed mode
  let finished = false, lastTick = -1;
  let videoDevices = [];                 // used only to decide whether to show the flip button
  // session phase: idle → count(3·2·1) → armed(wait first jump) → live(timer running)
  let phase = 'idle', countdownStart = 0, lastCountBeep = -1, warnStreak = 0;

  // ---------- pose overlay canvas ----------
  const poseCanvas = document.getElementById('pose');
  const pctx = poseCanvas.getContext('2d');

  // ---------- CPU motion engine (localized frame-diff for rope detection) ----------
  const MW = 80, MH = 60;                    // motion resolution, top-left origin
  const mCanvas = document.createElement('canvas');
  mCanvas.width = MW; mCanvas.height = MH;
  const mctx = mCanvas.getContext('2d', { willReadFrequently:true });
  let prevGray = null;
  const diffMap = new Float32Array(MW*MH);   // per-pixel motion 0..255
  let haveDiff = false;

  function frameDiff(){
    haveDiff = false;
    if(!video.videoWidth) return;
    mctx.drawImage(video, 0, 0, MW, MH);
    let img;
    try{ img = mctx.getImageData(0, 0, MW, MH).data; }catch(e){ return; }
    const gray = new Float32Array(MW*MH);
    for(let i=0, j=0; i<img.length; i+=4, j++){
      gray[j] = img[i]*0.299 + img[i+1]*0.587 + img[i+2]*0.114;
    }
    if(prevGray){
      for(let j=0; j<gray.length; j++){
        const d = Math.abs(gray[j] - prevGray[j]);
        diffMap[j] = d > 12 ? d : 0;         // suppress sensor noise
      }
      haveDiff = true;
    }
    prevGray = gray;
  }
  // mean motion inside a normalized [0..1] box (rope-pass energy near the feet)
  function roiMotion(x0, y0, x1, y1){
    if(!haveDiff) return 0;
    const gx0 = Math.max(0, Math.floor(x0*MW)), gx1 = Math.min(MW, Math.ceil(x1*MW));
    const gy0 = Math.max(0, Math.floor(y0*MH)), gy1 = Math.min(MH, Math.ceil(y1*MH));
    if(gx1 <= gx0 || gy1 <= gy0) return 0;
    let s = 0, n = 0;
    for(let y=gy0; y<gy1; y++){ const base = y*MW; for(let x=gx0; x<gx1; x++){ s += diffMap[base+x]; n++; } }
    return n ? s/(n*255) : 0;
  }

  // ---------- pose landmarker (MediaPipe Tasks Vision, off-thread + inline fallback) ----------
  // self-hosted MediaPipe assets, resolved against the page's base (works at root OR /subpath/)
  const MP_WASM  = new URL('mediapipe/wasm', document.baseURI).href;
  const MODEL_URL = new URL('mediapipe/pose_landmarker_lite.task', document.baseURI).href;
  let poseReady = false, poseFailed = false, poseTs = 0;
  let poseDelegate = '?', poseMs = 0, poseFps = 0, lastPoseWall = 0;   // perf diagnostics
  let poseWorker = null, useWorker = false, workerBusy = false, lastLm = null;
  let poseLandmarker = null;                                            // inline fallback engine

  function updatePerf(){
    if(perfEl.hidden) return;               // skip DOM writes while the readout is hidden
    perfEl.textContent = algo + '·' + poseDelegate + '  ' + Math.round(poseMs) + 'ms  ' + Math.round(poseFps) + 'fps';
  }
  let lastTimeStr = '';
  function setTime(s){ if(s !== lastTimeStr){ lastTimeStr = s; timeEl.textContent = s; } }
  // posture / visibility check → warning string, or null if OK to count
  function postureWarning(lm){
    if(!lm) return poseReady ? '没检测到人：请全身入画、站到镜头前' : '正在加载检测模型…';
    const vis=i=>(lm[i].visibility ?? 1);
    if(!(vis(11)>0.4 && vis(12)>0.4 && vis(23)>0.4 && vis(24)>0.4)) return '请正对/侧对镜头，上半身要清晰';
    const shY=(lm[11].y+lm[12].y)/2, hipY=(lm[23].y+lm[24].y)/2;
    if(hipY - shY < 0.06) return '请站直（保持直立姿态）';           // torso not vertical enough
    if(!(vis(27)>0.35 && vis(28)>0.35)) return '看不到脚：请让双脚入画（后退或调低镜头）';
    if((lm[27].y+lm[28].y)/2 < hipY) return '姿态异常：请正常站立';   // ankles above hips
    return null;
  }
  // per-frame handler shared by the worker + inline paths
  function processFrame(lm, now){
    const warn = postureWarning(lm);
    warnStreak = warn ? warnStreak+1 : 0;
    const showWarn = warn && warnStreak >= 6;      // debounce ~0.3s to avoid flicker
    if(phase === 'count'){
      if(warn){ countdownStart = 0; lastCountBeep = -1; }      // hold countdown until posture OK
      else if(!countdownStart){ countdownStart = now; lastCountBeep = -1; }
      if(showWarn){ hintEl.textContent = warn; hintEl.style.display=''; }
      return;                                       // no counting during countdown
    }
    detect(lm, now);                                // armed / live: count jumps
    if(showWarn){ hintEl.textContent = warn; hintEl.style.display=''; }
  }

  // primary path: inference in a Web Worker so a slow frame never freezes the UI
  function initPose(){
    try{
      poseWorker = new Worker('pose-worker.js', { type:'module' });
      poseWorker.onmessage = (e) => {
        const m = e.data;
        if(m.type === 'ready'){
          useWorker = true; poseReady = true; poseDelegate = m.delegate + '·w';
          if(!running && !finished){ hintEl.textContent = HINT_IDLE; hintEl.style.display = ''; }
        } else if(m.type === 'error'){
          if(!useWorker){ try{ poseWorker.terminate(); }catch(e){} poseWorker = null; initPoseInline(); }
        } else if(m.type === 'result'){ onPoseResult(m); }
      };
      poseWorker.onerror = () => { if(!useWorker){ try{ poseWorker.terminate(); }catch(e){} poseWorker = null; initPoseInline(); } };
      poseWorker.postMessage({ type:'init' });
      setTimeout(() => { if(!poseReady && poseWorker){ try{ poseWorker.terminate(); }catch(e){} poseWorker = null; initPoseInline(); } }, 12000);
    }catch(e){ initPoseInline(); }
  }
  function onPoseResult(m){
    workerBusy = false;
    if(!running) return;                    // ignore a frame that landed after Stop/pause
    poseMs += 0.2*(m.ms - poseMs);
    const wall = performance.now();
    if(lastPoseWall){ poseFps += 0.2*(1000/Math.max(1, wall - lastPoseWall) - poseFps); }
    lastPoseWall = wall;
    lastLm = m.lm;
    drawSkeleton(m.lm);
    processFrame(m.lm, m.ts);
    drawWave();                             // waveform data only changes on pose results
    updatePerf();
  }
  // grab one frame, hand it to the worker (transferable ImageBitmap); non-blocking
  function sendFrame(now){
    if(workerBusy || !poseWorker || !video.videoWidth) return;
    workerBusy = true;
    frameDiff();                                     // rope-ROI motion (cheap, main thread)
    const ts = Math.max(Math.round(now), poseTs + 1); poseTs = ts;
    createImageBitmap(video).then((bmp) => {
      if(poseWorker){ poseWorker.postMessage({ type:'frame', bitmap:bmp, ts }, [bmp]); }
      else { workerBusy = false; if(bmp.close) bmp.close(); }
    }).catch(() => { workerBusy = false; });
  }

  // ---------- inline fallback (synchronous, main thread) ----------
  async function initPoseInline(){
    try{
      const vision = await import(new URL('mediapipe/vision_bundle.mjs', document.baseURI).href);
      const fileset = await vision.FilesetResolver.forVisionTasks(MP_WASM);
      const opts = (delegate) => ({
        baseOptions:{ modelAssetPath: MODEL_URL, delegate },
        runningMode:'VIDEO', numPoses:1,
        minPoseDetectionConfidence:0.5, minPosePresenceConfidence:0.5, minTrackingConfidence:0.5
      });
      try{ poseLandmarker = await vision.PoseLandmarker.createFromOptions(fileset, opts('GPU')); poseDelegate='GPU'; }
      catch(e){ poseLandmarker = await vision.PoseLandmarker.createFromOptions(fileset, opts('CPU')); poseDelegate='CPU'; }
      poseReady = true; useWorker = false;
      if(!running && !finished){ hintEl.textContent = HINT_IDLE; hintEl.style.display = ''; }
    }catch(e){
      poseFailed = true;
      hintEl.textContent = '人体检测模型加载失败，请检查网络后刷新页面重试。';
      hintEl.style.display = '';
    }
  }
  function runPoseInline(now){
    if(!poseLandmarker || !video.videoWidth) return null;
    const ts = Math.max(Math.round(now), poseTs + 1); poseTs = ts;
    const t0 = performance.now();
    let r = null;
    try{ r = poseLandmarker.detectForVideo(video, ts); }catch(e){ return null; }
    poseMs += 0.2*((performance.now() - t0) - poseMs);
    if(lastPoseWall){ poseFps += 0.2*(1000/Math.max(1, t0 - lastPoseWall) - poseFps); }
    lastPoseWall = t0;
    return r;
  }

  // ---------- skeleton overlay ----------
  const LINKS = [[11,12],[11,23],[12,24],[23,24],[11,13],[13,15],[12,14],[14,16],
                 [23,25],[25,27],[24,26],[26,28],[27,31],[28,32],[27,29],[28,30]];
  const DOTS = [0,11,12,13,14,15,16,23,24,25,26,27,28,31,32];
  // cover-fit + mirror mapping: normalized raw-video coords -> display pixels
  function coverMap(cw, ch){
    const vw = video.videoWidth || cw, vh = video.videoHeight || ch;
    const scale = Math.max(cw/vw, ch/vh);
    const ox = (cw - vw*scale)/2, oy = (ch - vh*scale)/2;
    const mir = video.classList.contains('mirror');
    return (nx, ny) => {
      const x = ox + nx*vw*scale;
      return [ mir ? cw - x : x, oy + ny*vh*scale ];
    };
  }
  function drawSkeleton(lm){
    const dpr = window.devicePixelRatio||1;
    const cw = poseCanvas.clientWidth, ch = poseCanvas.clientHeight;
    if(!cw || !ch) return;
    if(poseCanvas.width !== Math.round(cw*dpr)){ poseCanvas.width = Math.round(cw*dpr); poseCanvas.height = Math.round(ch*dpr); }
    pctx.setTransform(dpr,0,0,dpr,0,0);
    pctx.clearRect(0,0,cw,ch);
    if(!lm) return;
    const map = coverMap(cw, ch);
    const vis = i => (lm[i].visibility ?? 1);
    pctx.lineWidth = 3; pctx.strokeStyle = 'rgba(61,220,132,.75)'; pctx.lineCap = 'round';
    pctx.beginPath();
    for(const [a,b] of LINKS){
      if(vis(a) < 0.35 || vis(b) < 0.35) continue;
      const [ax,ay] = map(lm[a].x, lm[a].y), [bx,by] = map(lm[b].x, lm[b].y);
      pctx.moveTo(ax,ay); pctx.lineTo(bx,by);
    }
    pctx.stroke();
    for(const i of DOTS){
      if(vis(i) < 0.35) continue;
      const [x,y] = map(lm[i].x, lm[i].y);
      pctx.beginPath(); pctx.arc(x,y,4.5,0,7);
      pctx.fillStyle = '#3ddc84'; pctx.fill();
      pctx.lineWidth = 2; pctx.strokeStyle = 'rgba(5,8,15,.6)'; pctx.stroke();
    }
  }

  // ---------- jump detection ----------
  // A jump translates the WHOLE body vertically once. We track five body parts
  // (nose, shoulders, hips, knees, ankles), each as its own detrended vertical
  // signal, and fuse them into a confidence-weighted consensus. Because a jump is
  // common-mode (all parts move together) while landmark jitter is independent per
  // part, the average keeps the jump and cancels the noise (~sqrt(N) quieter).
  // An online prominence peak-detector counts one landing per oscillation; a gate
  // on ankle-band motion (the rope pass) blocks counting when the feet aren't
  // actually moving — killing phantom counts while standing still.
  // Tuned + validated on a real 60s clip: 158/158 vs the offline peak reference,
  // and 0 false counts on a still subject. (see scratchpad/*validate*.py)
  const PARTS = [
    { y:[0],     v:[0]     },   // nose
    { y:[11,12], v:[11,12] },   // shoulder centre
    { y:[23,24], v:[23,24] },   // hip centre
    { y:[25,26], v:[25,26] },   // knee centre
    { y:[27,28], v:[27,28] },   // ankle centre
  ];
  const A_FAST=0.70, A_SLOW=0.04, PROM_FLOOR=0.006;   // adaptive: floor low, threshold rides local amplitude
  const MINGAP=200, ROPE_GATE=0.0025;                    // refractory ms / foot-motion gate
  let pF=[], pS=[];                                       // per-part EMAs
  let cDevA=0.02, cPrev=null, cState='up', cVMin=0;       // consensus peak-detector state
  let ropeLvl=0, lastJump=0;
  // rhythm-stability gate: only count sustained, in-tempo jumps. A trip / stumble
  // breaks the rhythm (an off-tempo or too-weak or too-long beat); counting pauses
  // and resumes ONLY after GK consecutive in-tempo beats re-establish a steady
  // cadence — the stumble beats are never counted, and the tally advances one at a
  // time (no retroactive batch), so it never jumps up suddenly after a trip.
  const GK=2, G_LO=0.55, G_HI=2.2, G_AMPLO=0.30, G_MAXGAP=850;
  const G_RETRO=500, G_MINPAUSE=350;    // on a trip: un-count the last G_RETRO ms, then hold
  let gLast=0, gMedInt=0, gMedAmp=0, gRun=0, gCounting=false, gPausedUntil=0;

  // ---------- Version B: CSDN ankle-based (switchable) ----------
  // Single lower-body signal (ankle-centre y); a jump = a local maximum (foot lowest
  // / landing) confirmed by a short lookahead, with a prominence check vs the recent
  // minimum + a refractory. No rope/rhythm gates — simpler, and the big-amplitude
  // ankle signal catches small bounces the body-consensus can miss.
  let algo = 'B';                       // 'B' ankle (default, handles double-bounce) | 'A' body-consensus
  const B_WIN=5, B_LOOK=2, B_MINN=10, B_KPROM=0.5, B_FLOOR=0.015, B_REFR=200, DB_FRAC=0.5;
  let bBuf=[], bBase=null, bDevA=0.02, bLast=0, bIvs=[];   // bIvs = recent counted intervals (double-bounce guard)

  function resetDetector(){
    pF = PARTS.map(()=>null); pS = PARTS.map(()=>null);
    cDevA=0.02; cPrev=null; cState='up'; cVMin=0;
    ropeLvl=0; lastJump=0; prevGray=null; haveDiff=false;
    gLast=0; gMedInt=0; gMedAmp=0; gRun=0; gCounting=false; gPausedUntil=0;
    workerBusy=false; lastLm=null;
    bBuf=[]; bBase=null; bDevA=0.02; bLast=0; bIvs=[];
  }
  function pushHist(v, hit){
    history.push({ v, hit });
    if(history.length > MAXH) history.shift();
  }
  const avgY  = (lm, ids) => { let s=0; for(const i of ids) s+=lm[i].y; return s/ids.length; };
  const minVis= (lm, ids) => { let m=1; for(const i of ids) m=Math.min(m, lm[i].visibility ?? 1); return m; };

  function detect(lm, now){ return algo === 'B' ? detectB(lm, now) : detectA(lm, now); }

  // Version B: pure ankle-centre vertical, lookahead local-max + prominence, no gates
  function detectB(lm, now){
    let hit = false, wv = 0;
    if(lm && minVis(lm,[27,28]) > 0.35){
      const v = (lm[27].y + lm[28].y)/2;            // ankle centre y (landing = larger)
      bBase = bBase===null ? v : bBase + 0.04*(v - bBase);
      const dv = v - bBase; bDevA += 0.03*(Math.abs(dv) - bDevA);
      wv = Math.max(-1.4, Math.min(1.4, dv/(bDevA*3 + 1e-4)));
      bBuf.push({ t:now, v });
      if(bBuf.length > B_MINN) bBuf.shift();
      if(bBuf.length >= B_WIN){
        const cand = bBuf[bBuf.length - 1 - B_LOOK];   // candidate B_LOOK samples back
        let isMax = true, mn = Infinity;
        for(let k=bBuf.length-B_WIN; k<bBuf.length; k++){ if(bBuf[k].v > cand.v) isMax = false; }
        for(let k=0; k<bBuf.length; k++){ if(bBuf[k].v < mn) mn = bBuf[k].v; }
        if(isMax){
          const prom = cand.v - mn;
          const thr = Math.max(B_FLOOR, bDevA*B_KPROM);
          if(prom >= thr && (cand.t - bLast) >= B_REFR){
            // double-bounce guard: a peak far too early vs the recent rhythm is an
            // intermediate bounce (foot bounced twice, rope passed once) → skip it
            let dbl = false;
            if(bIvs.length >= 3){
              const s = bIvs.slice(-6).sort((a,b)=>a-b), med = s[s.length>>1];
              if((cand.t - bLast) < DB_FRAC*med) dbl = true;
            }
            if(!dbl){
              if(bLast > 0){ bIvs.push(cand.t - bLast); if(bIvs.length > 8) bIvs.shift(); }
              bLast = cand.t; addJump(cand.t, prom); hit = true;
            }
          }
        }
      }
    }
    pushHist(wv, hit);
  }

  function detectA(lm, now){
    let hit = false, wv = 0;
    const sens = +sensEl.value;                    // 1..10
    if(lm){
      // rope gate: motion in the ankle band as the rope passes under the feet
      let rE = 0;
      if(minVis(lm,[27,28]) > 0.35){
        const ax=(lm[27].x+lm[28].x)/2, ay=(lm[27].y+lm[28].y)/2;
        rE = roiMotion(ax-0.17, ay-0.05, ax+0.17, ay+0.17);
      }
      ropeLvl += 0.15*(rE - ropeLvl);

      // confidence-weighted consensus of the five parts' detrended vertical position
      let num=0, den=0;
      for(let k=0;k<PARTS.length;k++){
        const y = avgY(lm, PARTS[k].y);
        pF[k] = pF[k]===null ? y : pF[k] + A_FAST*(y - pF[k]);
        pS[k] = pS[k]===null ? y : pS[k] + A_SLOW*(y - pS[k]);
        const w = minVis(lm, PARTS[k].v);
        if(w < 0.3) continue;
        num += w*(pF[k] - pS[k]); den += w;        // dev>0 = that part is lower (landing)
      }
      if(den > 0){
        const c = num/den;
        cDevA += 0.03*(Math.abs(c) - cDevA);   // slow local-amplitude estimate (~1s)
        const kp = Math.max(0.30, 1.00 - sens*0.08);
        const prom = Math.max(cDevA*kp, PROM_FLOOR);
        wv = Math.max(-1.4, Math.min(1.4, c/(cDevA*3 + 1e-4)));
        if(cPrev === null){ cPrev = c; cVMin = c; }
        else {
          if(c > cPrev){                            // rising
            if(cState === 'down'){ cVMin = cPrev; cState = 'up'; }
          } else if(c < cPrev){                      // falling — cPrev was a local max (landing)
            if(cState === 'up'){
              const peak = cPrev;
              if(ropeLvl >= ROPE_GATE && (peak - cVMin) >= prom && (now - lastJump) >= MINGAP){
                lastJump = now;
                const before = count;
                onCandidate(now, peak - cVMin);        // rhythm gate decides if it counts
                if(count > before) hit = true;
                cVMin = peak;
              }
              cState = 'down';
            }
          }
          cPrev = c;
        }
      }
    }
    pushHist(wv, hit);
  }

  // ---------- audio ----------
  let actx = null;
  function beep(freq=880, dur=0.06){
    if(!soundOn) return;
    try{
      actx = actx || new (window.AudioContext||window.webkitAudioContext)();
      const o = actx.createOscillator(), g = actx.createGain();
      o.frequency.value = freq; o.type='square';
      g.gain.setValueAtTime(0.08, actx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+dur);
      o.connect(g).connect(actx.destination);
      o.start(); o.stop(actx.currentTime+dur);
    }catch(e){}
  }

  // A landing peak survived detection — accept it only if it continues a steady
  // cadence. On a break we pause (gCounting=false) and need GK in-tempo beats to
  // resume; those confirmation beats and the stumble are NOT counted.
  function onCandidate(now, amp){
    if(gRun === 0){ gRun=1; gLast=now; gMedAmp=amp; gMedInt=0; return; }
    const iv = now - gLast; gLast = now;
    let broke = false;
    if(gMedInt === 0){                               // seeding a fresh run
      if(iv <= G_MAXGAP){ gMedInt=iv; gMedAmp += 0.3*(amp-gMedAmp); gRun=2; }
      else { gRun=1; gMedAmp=amp; broke=true; }      // long gap → restart the seed
    } else {
      const inTempo = iv >= G_LO*gMedInt && iv <= G_HI*gMedInt && iv <= G_MAXGAP && amp >= G_AMPLO*gMedAmp;
      if(inTempo){
        gRun++; gMedInt += 0.3*(iv-gMedInt); gMedAmp += 0.3*(amp-gMedAmp);
      } else {
        gRun=1; gMedInt=0; gMedAmp=amp; broke=true;  // rhythm broke → reseed here
      }
    }
    if(broke){
      if(gCounting) onBreak(now);                    // a trip while counting
      gCounting = false;
      return;
    }
    if(!gCounting && gRun >= GK && now >= gPausedUntil) gCounting = true;
    if(gCounting) addJump(now, amp);
  }
  // A trip was detected: the last couple of beats were the stumble, not clean jumps —
  // take them back, and hold counting paused until steady jumping is re-established.
  function onBreak(now){
    let removed = 0;
    while(jumpTimes.length && jumpTimes[jumpTimes.length-1] > now - G_RETRO){ jumpTimes.pop(); removed++; }
    if(removed > 0){
      count = Math.max(0, count - removed);
      if(removed <= jumpLog.length) jumpLog.splice(-removed);   // drop the un-counted stumble beats
      countEl.textContent = count;
      calEl.textContent = (count*0.0015*70).toFixed(1);
    }
    breakLog.push({ t: Math.round(now - startTs), retro: removed, pauseMs: G_MINPAUSE });
    gPausedUntil = now + G_MINPAUSE;
  }
  function addJump(now, amp){
    if(phase === 'armed'){ phase = 'live'; startTs = now; }   // first jump starts the clock
    count++;
    jumpTimes.push(now);
    while(jumpTimes.length > 12) jumpTimes.shift();
    // export log: timing of this +1, its vertical amplitude, interval since last
    const tRel = Math.round(now - startTs);
    const prev = jumpLog.length ? jumpLog[jumpLog.length-1].t : null;
    jumpLog.push({ n: count, t: tRel, amp: (amp!=null ? +amp.toFixed(4) : null), iv: (prev!=null ? tRel - prev : null) });
    countEl.textContent = count;
    countEl.classList.add('pop');
    setTimeout(()=>countEl.classList.remove('pop'), 120);
    beep(count % 100 === 0 ? 1320 : 880);
    if(navigator.vibrate) navigator.vibrate(15);
    hintEl.style.display = 'none';
    if(jumpTimes.length >= 3){
      const span = jumpTimes[jumpTimes.length-1] - jumpTimes[0];
      if(span > 0) bpmEl.textContent = Math.round((jumpTimes.length-1)/span*60000);
    }
    calEl.textContent = (count*0.0015*70).toFixed(1); // rough: ~0.1 kcal/jump @70kg
  }

  // ---------- waveform (signature strip) ----------
  function drawWave(){
    const dpr = window.devicePixelRatio||1;
    const cw = wave.clientWidth, ch = wave.clientHeight;
    if(wave.width !== cw*dpr){ wave.width = cw*dpr; wave.height = ch*dpr; }
    wctx.setTransform(dpr,0,0,dpr,0,0);
    wctx.clearRect(0,0,cw,ch);
    const mid = ch*0.5, scale = ch*0.30;    // body-bob oscillation around centre
    // baseline
    wctx.strokeStyle = 'rgba(133,147,171,.35)';
    wctx.setLineDash([2,5]); wctx.beginPath();
    wctx.moveTo(0,mid); wctx.lineTo(cw,mid); wctx.stroke(); wctx.setLineDash([]);
    // signal
    wctx.strokeStyle = '#ff4b3e'; wctx.lineWidth = 1.6; wctx.beginPath();
    const step = cw/(MAXH-1);
    history.forEach((h,i)=>{
      const x = i*step, y = mid - h.v*scale;
      i===0 ? wctx.moveTo(x,y) : wctx.lineTo(x,y);
    });
    wctx.stroke();
    // hits
    wctx.fillStyle = '#3ddc84';
    history.forEach((h,i)=>{
      if(h.hit){ wctx.beginPath(); wctx.arc(i*step, mid - h.v*scale, 3.2, 0, 7); wctx.fill(); }
    });
  }

  // ---------- main loop ----------
  // Pose inference is the expensive step; run it on a throttled ~22 fps cadence
  // (jumps are only ~2.6 Hz, so this is plenty) to keep phones smooth.
  const POSE_INTERVAL = 33;   // cap send/inference cadence (~30fps); jumps are only ~2.6 Hz
  let lastPoseTs = 0;
  function loop(now){
    if(!running) return;
    if(video.readyState >= 2 && now - lastPoseTs >= POSE_INTERVAL){
      if(useWorker){
        // hand a frame to the worker; skeleton/detect happen when it replies (non-blocking)
        if(!workerBusy){ sendFrame(now); lastPoseTs = now; }
      } else if(poseReady){
        frameDiff();
        const res = runPoseInline(now);
        const lm = res && res.landmarks && res.landmarks[0] ? res.landmarks[0] : null;
        drawSkeleton(lm);
        processFrame(lm, now);
        updatePerf();
        lastPoseTs = performance.now();     // gap measured from when the blocking work finished
      }
    }
    // ---- phase-driven countdown + timer ----
    if(phase === 'count'){
      if(countdownStart){
        const cd = Math.ceil((3000 - (now - countdownStart))/1000);
        if(cd >= 1){
          if(cd !== lastCountBeep){                    // touch the DOM only when the digit changes
            lastCountBeep = cd;
            countdownEl.textContent = cd; countdownEl.style.display = '';
            beep(760, 0.09); if(navigator.vibrate) navigator.vibrate(20);
          }
        } else {
          phase = 'armed'; countdownEl.style.display = 'none'; beep(1240, 0.16);
          hintEl.textContent = '开始跳！第一跳开始计时'; hintEl.style.display = '';
        }
      } else if(countdownEl.style.display !== 'none'){ countdownEl.style.display = 'none'; }
      setTime(mode === 'timed' ? '1:00' : '0:00');
    } else if(phase === 'armed'){
      setTime(mode === 'timed' ? '1:00' : '0:00');     // frozen until first jump
    } else if(phase === 'live'){
      elapsed = now - startTs;
      if(mode === 'timed'){
        const rem = Math.max(0, TIMED_MS - elapsed);
        const rs = Math.ceil(rem/1000);
        setTime(Math.floor(rs/60) + ':' + String(rs%60).padStart(2,'0'));
        if(rem > 0 && rs <= 3 && rs !== lastTick){ lastTick = rs; beep(700, 0.05); }
        if(rem <= 0){ finish(); return; }
      } else {
        const s = Math.floor(elapsed/1000);
        setTime(Math.floor(s/60) + ':' + String(s%60).padStart(2,'0'));
      }
    }
    rafId = requestAnimationFrame(loop);
  }

  // ---------- camera ----------
  // Toggle front/back semantically via facingMode — never cycle raw deviceIds:
  // phones expose several rear lenses as separate devices, so an index cycle gets
  // stuck hopping between back lenses (the "only switches once" bug).
  let facing = 'user';
  async function openCamera(){
    const base = { width:{ideal:480}, height:{ideal:360}, frameRate:{ideal:30} };
    stream = await navigator.mediaDevices.getUserMedia({ video:{ ...base, facingMode:{ ideal: facing } }, audio:false });
    video.srcObject = stream;
    await video.play();
    updateMirror();
  }
  function updateMirror(){
    const track = stream && stream.getVideoTracks()[0];
    const fm = (track && track.getSettings && track.getSettings().facingMode) || facing;
    video.classList.toggle('mirror', fm !== 'environment'); // mirror front/unknown, keep rear as-is
  }
  async function refreshDevices(){
    try{
      const devs = await navigator.mediaDevices.enumerateDevices();
      videoDevices = devs.filter(d => d.kind === 'videoinput');
      btnFlip.style.display = (running && videoDevices.length > 1) ? 'flex' : 'none';
    }catch(e){}
  }
  async function switchCamera(){
    if(!running) return;
    facing = (facing === 'user') ? 'environment' : 'user';
    if(stream){ stream.getTracks().forEach(t => t.stop()); stream = null; }
    try{ await openCamera(); }
    catch(e){
      facing = (facing === 'user') ? 'environment' : 'user';   // roll back and reopen
      try{ await openCamera(); }catch(e2){}
      hintEl.textContent = '切换摄像头失败，请重试。'; hintEl.style.display = '';
      return;
    }
    resetDetector();   // avoid a false count across the switch
    refreshDevices();
  }

  // ---------- controls ----------
  const HINT_IDLE = '点击「开始」并允许摄像头。侧对或正对镜头，全身入画，开始跳绳即可自动计数。';
  const HINT_RUN  = '就位后直接开跳，检测到起跳节奏会自动计数。计不到数就把灵敏度调高。';
  async function start(){
    try{ await openCamera(); }
    catch(e){
      hintEl.textContent = '无法打开摄像头：请检查浏览器权限设置后重试。';
      hintEl.style.display = '';
      return;
    }
    running = true; finished = false; resetDetector();
    countEl.classList.remove('done');
    if(elapsed > 0){                                  // resume after pause → continue live
      phase = 'live'; startTs = performance.now() - elapsed;
      hintEl.textContent = HINT_RUN;
    } else {                                          // fresh session → 3·2·1 countdown, timer starts on first jump
      phase = 'count'; countdownStart = 0; lastCountBeep = -1; warnStreak = 0;
      hintEl.textContent = '准备…请站到镜头前，全身入画';
    }
    hintEl.style.display = '';
    camDot.classList.add('live');
    btnMain.textContent = '暂停'; btnMain.classList.add('running');
    refreshDevices();
    rafId = requestAnimationFrame(loop);
  }
  function stop(){
    running = false;
    cancelAnimationFrame(rafId);
    if(stream){ stream.getTracks().forEach(t => t.stop()); stream = null; }
    camDot.classList.remove('live');
    btnFlip.style.display = 'none';
    drawSkeleton(null); countdownEl.style.display = 'none';
    if(!finished){ btnMain.textContent = '继续'; btnMain.classList.remove('running'); }
  }
  function finish(){
    finished = true; phase = 'idle';
    stop();
    elapsed = TIMED_MS;
    setTime('0:00');
    countEl.classList.add('done');
    btnMain.textContent = '再来一次'; btnMain.classList.remove('running');
    hintEl.innerHTML = '⏱ 时间到 · 这一分钟跳了 <b>' + count + '</b> 次。点「再来一次」重新开始。';
    hintEl.style.display = '';
    beep(1320, 0.12); setTimeout(() => beep(1660, 0.16), 150);
    if(navigator.vibrate) navigator.vibrate([40,60,40]);
  }
  function resetRun(){
    count = 0; elapsed = 0; jumpTimes = []; history.length = 0;
    jumpLog = []; breakLog = [];
    finished = false; lastTick = -1;
    phase = 'idle'; countdownStart = 0; lastCountBeep = -1; countdownEl.style.display = 'none';
    countEl.textContent = '0'; countEl.classList.remove('done');
    bpmEl.textContent = '--'; calEl.textContent = '0';
    setTime(mode === 'timed' ? '1:00' : '0:00');
    if(!running){
      btnMain.textContent = '开始'; btnMain.classList.remove('running');
      hintEl.textContent = HINT_IDLE; hintEl.style.display = '';
      drawWave();
    }
  }
  // export the session: each +1 timing, its vertical amplitude, interruption gaps
  async function exportData(){
    const durationMs = Math.round(elapsed);
    const interruptions = jumpLog.filter(j => j.iv && j.iv > 800).map(j => ({ tMs: j.t - j.iv, gapMs: j.iv }));
    const data = {
      app: 'skip-count', exportedAt: new Date().toISOString(),
      algo, mode, durationMs, count,
      avgCadencePerMin: durationMs > 0 ? +(count / (durationMs/60000)).toFixed(1) : 0,
      ampUnit: 'normalized frame height · ' + (algo === 'B' ? 'ankle' : 'body-consensus'),
      jumps: jumpLog,            // {n, t(ms), amp, iv(ms since previous +1)}
      breaks: breakLog,          // {t(ms), retro(un-counted), pauseMs} — algo A trip pauses
      interruptions              // gaps > 800ms between counted jumps
    };
    const json = JSON.stringify(data, null, 2);
    const stamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
    const fname = 'skip-' + stamp + '.json';
    const file = new File([json], fname, { type: 'application/json' });
    if(navigator.canShare && navigator.canShare({ files: [file] })){
      try{ await navigator.share({ files: [file], title: '跳绳数据' }); return; }
      catch(e){ if(e && e.name === 'AbortError') return; }   // user cancelled the share sheet
    }
    const url = URL.createObjectURL(file);
    const a = document.createElement('a'); a.href = url; a.download = fname;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  // ---------- pace + vertical-height chart (client-side canvas) ----------
  function rollMed(arr, w){
    const out = new Array(arr.length).fill(null), h = w>>1;
    for(let i=0;i<arr.length;i++){
      const s=[];
      for(let k=Math.max(0,i-h); k<=Math.min(arr.length-1,i+h); k++){ const v=arr[k]; if(v!=null && !isNaN(v)) s.push(v); }
      if(s.length){ s.sort((a,b)=>a-b); out[i]=s[s.length>>1]; }
    }
    return out;
  }
  function renderChart(){
    const W=1600, H=780, cv=document.createElement('canvas'); cv.width=W; cv.height=H;
    const g=cv.getContext('2d');
    const INK='#0e1420',PAPER='#e9edf5',DIM='#8593ab',HOT='#ff4b3e',GO='#3ddc84',GOLD='#f5c344',LINE='#26324a',BLUE='#8fb0ff';
    const FONT='-apple-system,"PingFang SC","Helvetica Neue",Arial,sans-serif';
    g.fillStyle=INK; g.fillRect(0,0,W,H);
    const pL=72,pT=64,pB=H-58,pR=W-74, pW=pR-pL, pH=pB-pT;
    const durS=Math.max(1,(jumpLog.length?jumpLog[jumpLog.length-1].t:elapsed)/1000);
    const gaps=jumpLog.filter(j=>j.iv&&j.iv>800).map(j=>({a:(j.t-j.iv)/1000,b:j.t/1000,s:j.iv/1000}));
    // aggregate into 5-second segments (cleaner than per-jump)
    const BIN=5, nb=Math.max(1,Math.round(durS/BIN)), seg=[];
    for(let b=0;b<nb;b++){
      const t0=b*BIN, t1=(b===nb-1)? durS : (b+1)*BIN, sec=Math.max(0.1,t1-t0);
      const inb=jumpLog.filter(j=>{ const s=j.t/1000; return s>=t0 && (b===nb-1? s<=t1+0.001 : s<t1); });
      const amps=inb.map(j=>j.amp).filter(v=>v!=null);
      seg.push({ t0,t1, cx:(t0+t1)/2, pace: inb.length/(sec/60),
        ht: amps.length ? amps.reduce((a,c)=>a+c,0)/amps.length*100 : null });
    }
    const CADMAX=Math.max(200, Math.ceil((Math.max(60,...seg.map(s=>s.pace))+20)/50)*50);
    const HMAX=Math.max(6, Math.ceil(Math.max(0,...seg.map(s=>s.ht||0))+1));
    const X=t=>pL+(t/durS)*pW, Yc=c=>pB-(Math.min(c,CADMAX)/CADMAX)*pH, Yh=v=>pB-(Math.min(v,HMAX)/HMAX)*pH;

    // trip spans
    g.fillStyle='rgba(255,75,62,0.18)';
    for(const gp of gaps) g.fillRect(X(gp.a),pT,Math.max(2,X(gp.b)-X(gp.a)),pH);
    // grid + axes
    g.font='13px '+FONT; g.textBaseline='middle';
    for(let c=0;c<=CADMAX;c+=50){ const y=Yc(c); g.strokeStyle=LINE; g.globalAlpha=.35; g.beginPath(); g.moveTo(pL,y); g.lineTo(pR,y); g.stroke(); g.globalAlpha=1; g.fillStyle=DIM; g.textAlign='right'; g.fillText(c,pL-8,y); }
    g.fillStyle=GOLD; g.textAlign='left';
    for(let h=0;h<=HMAX;h+=(HMAX>8?4:2)){ g.fillText(h+'%',pR+8,Yh(h)); }
    g.fillStyle=DIM; g.textAlign='center'; g.textBaseline='top';
    for(let s=0;s<=Math.ceil(durS);s+=5){ g.fillText(s,X(s),pB+6); }
    // pace bars (每5秒)
    for(const s of seg){
      const x0=X(s.t0)+3, x1=X(s.t1)-3, y=Yc(s.pace);
      g.fillStyle='rgba(61,220,132,0.32)'; g.fillRect(x0,y,Math.max(2,x1-x0),pB-y);
      g.fillStyle=GO; g.textAlign='center'; g.textBaseline='bottom'; g.font='bold 14px '+FONT;
      g.fillText(Math.round(s.pace),(x0+x1)/2,y-5);
    }
    // reference lines
    const avg=count/(durS/60);
    g.setLineDash([6,5]); g.strokeStyle='rgba(233,237,245,.6)'; g.beginPath(); g.moveTo(pL,Yc(avg)); g.lineTo(pR,Yc(avg)); g.stroke();
    g.strokeStyle=BLUE; g.setLineDash([2,4]); g.beginPath(); g.moveTo(pL,Yc(160)); g.lineTo(pR,Yc(160)); g.stroke(); g.setLineDash([]);
    g.textAlign='left'; g.textBaseline='bottom'; g.fillStyle=PAPER; g.font='13px '+FONT; g.fillText('平均 '+Math.round(avg)+'/分',pL+4,Yc(avg)-3);
    g.fillStyle=BLUE; g.fillText('目标 160/分',pL+4,Yc(160)-3);
    // height line + markers (每5秒均值)
    g.strokeStyle=GOLD; g.lineWidth=3; g.lineJoin='round'; g.beginPath(); let st=false;
    for(const s of seg){ if(s.ht==null)continue; const x=X(s.cx),y=Yh(s.ht); st?g.lineTo(x,y):g.moveTo(x,y); st=true; }
    g.stroke();
    g.fillStyle=GOLD;
    for(const s of seg){ if(s.ht==null)continue; g.beginPath(); g.arc(X(s.cx),Yh(s.ht),5,0,7); g.fill(); }
    // trip labels
    g.fillStyle=HOT; g.textAlign='center'; g.textBaseline='top'; g.font='bold 12px '+FONT;
    for(const gp of gaps){ const cx=(X(gp.a)+X(gp.b))/2; g.fillText('绊绳',cx,pT+4); g.fillText(gp.s.toFixed(1)+'s',cx,pT+20); }
    // title + axis labels + legend
    g.fillStyle=PAPER; g.textAlign='center'; g.textBaseline='top'; g.font='bold 18px '+FONT;
    g.fillText('跳绳配速 + 垂直高度（每5秒）· '+count+' 次 / '+durS.toFixed(1)+'s（'+Math.round(avg)+'/分）· 绊绳 '+gaps.length+' 次 · 算法 '+algo, W/2, 14);
    g.save(); g.translate(20,H/2); g.rotate(-Math.PI/2); g.textAlign='center'; g.font='13px '+FONT; g.fillStyle=PAPER; g.fillText('配速 (次/分钟)',0,0); g.restore();
    g.save(); g.translate(W-14,H/2); g.rotate(Math.PI/2); g.textAlign='center'; g.fillStyle=GOLD; g.fillText('垂直高度 (% 画面高度)',0,0); g.restore();
    g.fillStyle=DIM; g.textAlign='center'; g.textBaseline='top'; g.font='13px '+FONT; g.fillText('时间 (秒)',W/2,H-24);
    // legend
    g.textAlign='left'; g.textBaseline='middle';
    g.fillStyle='rgba(61,220,132,0.5)'; g.fillRect(pL+8,pB-39,26,14); g.fillStyle=PAPER; g.font='14px '+FONT; g.fillText('配速 (每5秒)',pL+42,pB-32);
    g.strokeStyle=GOLD; g.lineWidth=3; g.beginPath(); g.moveTo(pL+8,pB-12); g.lineTo(pL+40,pB-12); g.stroke(); g.fillStyle=PAPER; g.fillText('垂直高度 (每5秒均值)',pL+46,pB-12);
    return cv;
  }
  function exportChart(){
    if(!jumpLog.length){ hintEl.textContent='还没有数据，先跳几下再导出图表。'; hintEl.style.display=''; return; }
    const cv=renderChart();
    const fname='skip-chart-'+new Date().toISOString().replace(/[:.]/g,'-').slice(0,19)+'.png';
    cv.toBlob(async (blob)=>{
      if(!blob) return;
      const file=new File([blob],fname,{type:'image/png'});
      if(navigator.canShare && navigator.canShare({files:[file]})){
        try{ await navigator.share({files:[file],title:'跳绳配速图'}); return; }
        catch(e){ if(e && e.name==='AbortError') return; }
      }
      const url=URL.createObjectURL(file); const a=document.createElement('a'); a.href=url; a.download=fname;
      document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1000);
    }, 'image/png');
  }
  function setMode(m){
    if(m === mode) return;
    mode = m;
    [...modeSeg.children].forEach(b => b.classList.toggle('active', b.dataset.mode === m));
    timeLabel.textContent = m === 'timed' ? '倒计时' : '用时';
    if(running) stop();
    resetRun();
  }
  function setAlgo(a){
    if(a === algo) return;
    algo = a;
    [...algoSeg.children].forEach(b => b.classList.toggle('active', b.dataset.algo === a));
    if(running) stop();
    resetDetector();
    resetRun();
  }

  btnMain.addEventListener('click', () => {
    if(running){ stop(); return; }
    if(finished) resetRun();
    start();
  });
  btnReset.addEventListener('click', resetRun);
  btnFlip.addEventListener('click', switchCamera);
  modeSeg.addEventListener('click', (e) => {
    const b = e.target.closest('.seg-btn');
    if(b) setMode(b.dataset.mode);
  });
  algoSeg.addEventListener('click', (e) => {
    const b = e.target.closest('.seg-btn');
    if(b) setAlgo(b.dataset.algo);
  });
  btnSound.addEventListener('click', ()=>{
    soundOn = !soundOn;
    btnSound.classList.toggle('on', soundOn);
    btnSound.setAttribute('aria-checked', soundOn);
  });
  btnSettings.addEventListener('click', ()=>{
    settingsEl.hidden = !settingsEl.hidden;
    perfEl.hidden = settingsEl.hidden;                 // show the perf readout with the panel
    btnSettings.classList.toggle('on', !settingsEl.hidden);
  });
  btnExport.addEventListener('click', exportData);
  btnChart.addEventListener('click', exportChart);
  document.addEventListener('visibilitychange', ()=>{ if(document.hidden && running) stop(); });

  // ---------- boot: start downloading the pose model right away ----------
  hintEl.textContent = '正在加载人体检测模型…（首次约需几秒）';
  initPose();
})();
</script>

  // installable web app + offline caching
  if('serviceWorker' in navigator){
    window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
  }
</script>
